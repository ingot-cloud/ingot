spring:
  datasource:
    # 数据库连接URL配置
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ingot_core}?useUnicode=true&characterEncoding=UTF8&useSSL=${MYSQL_SSL:false}&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true&cachePrepStmts=true&prepStmtCacheSize=${MYSQL_PREP_STMT_CACHE_SIZE:250}&prepStmtCacheSqlLimit=${MYSQL_PREP_STMT_SQL_LIMIT:2048}&cacheResultSetMetadata=true&cacheServerConfiguration=true&maintainTimeStats=false&useLocalSessionState=true&elideSetAutoCommits=true&socketTimeout=${MYSQL_SOCKET_TIMEOUT:30000}&connectTimeout=${MYSQL_CONNECT_TIMEOUT:10000}

# Ingot业务配置
ingot:
  account:
    lockout:
      # 是否启用自动锁定账号
      enabled: ${ACCOUNT_LOCKOUT_ENABLED:true}
  oss:
    minio:
      url: ${MINIO_URL:http://ingot-cloud:9090}
      accessKey: ${MINIO_ACCESS_KEY:2NPpKzxFQjyeMTQFEXA1}
      secretKey: ${MINIO_SECRET_KEY:8SGAp7DhqZCQrYnU9Poyu888pQOB6w4SP2ILHbVU}
    rustfs:
      url: ${RUSTFS_URL:http://ingot-cloud:19000}
      accessKey: ${RUSTFS_ACCESS_KEY:7eYdiTxLbcpsfaNoKSQ0}
      secretKey: ${RUSTFS_SECRET_KEY:PgXcoiT9bmYBrIUj6S7QHltf0w8KDzWaC5FMqLsx}
  social:
    wechat:
      miniProgramAppId: wx18dc0ea8c6ca1d7d
  # MyBatis SQL日志配置
  mybatis:
    show-sql-log: ${MYBATIS_SHOW_SQL:false}

# SpringDoc/Swagger配置（生产环境关闭）
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# ==================== 日志配置 ====================
logs:
  path: ${LOG_PATH:/ingot-data/logs}
  mybatisMapper: com.ingot.cloud.pms.mapper

# 生产环境日志级别配置
logging:
  level:
    root: ${LOG_LEVEL_ROOT:WARN}
    org.springframework.web: ${LOG_LEVEL_WEB:WARN}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.cloud: ${LOG_LEVEL_CLOUD:WARN}
    com.alibaba.nacos.client: ${LOG_LEVEL_NACOS:ERROR}
    com.alibaba.cloud: ${LOG_LEVEL_ALIBABA_CLOUD:WARN}
    com.ingot: ${LOG_LEVEL_APP:INFO}
  logback:
    rollingpolicy:
      max-file-size: ${LOG_FILE_MAX_SIZE:100MB}
      max-history: ${LOG_FILE_MAX_HISTORY:30}
      total-size-cap: ${LOG_FILE_TOTAL_SIZE:20GB}