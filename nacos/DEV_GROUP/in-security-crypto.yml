ingot:
  security:
    crypto:
      hybrid:
        response-wrap: DATA_ONLY          # DATA_ONLY:只加密 R.data, FULL:加密所有
        active-kid: k-2026-08             # 当前激活 kid，响应头 In-Crypto-Kv 会回这个值
        public-key-endpoint-enabled: true # 仅公钥下发服务开 true，其它服务可 false
        replay-namespace: crypto
        key-pairs:
          k-2026-07:                      # kid 自定义，与前端请求头 In-Crypto-Kv 对应
            public-key: 
            private-key: 
          k-2026-08:
            public-key: 
            private-key: 
      secretKeys:
        # 加密密钥 - 生产环境必须通过环境变量配置
        aes: ${CRYPTO_AES_KEY:ingotingotingot1}
        aes_gcm: ${CRYPTO_AES_GCM_KEY:ingotingotingot1}